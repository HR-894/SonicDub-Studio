<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px; background: #1e1e2e; color: #cdd6f4;
      font-family: 'Segoe UI', sans-serif; padding: 16px;
    }
    h1 { font-size: 18px; color: #89b4fa; margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; color: #a6adc8; font-size: 12px; }
    select, input {
      width: 100%; background: #313244; border: 1px solid #45475a;
      color: #cdd6f4; padding: 6px 8px; border-radius: 6px; margin-bottom: 12px;
      font-size: 13px;
    }
    button {
      width: 100%; background: #89b4fa; color: #1e1e2e; border: none;
      padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #74c7ec; }
    .status { margin-top: 12px; padding: 8px; background: #313244; 
              border-radius: 6px; font-size: 12px; color: #a6e3a1; }
  </style>
</head>
<body>
  <h1>🎬 VideoDubber</h1>
  
  <label>Target Language</label>
  <select id="target_lang">
    <option value="hi">🇮🇳 Hindi</option>
    <option value="es">🇪🇸 Spanish</option>
    <option value="fr">🇫🇷 French</option>
    <option value="de">🇩🇪 German</option>
    <option value="ja">🇯🇵 Japanese</option>
    <option value="ko">🇰🇷 Korean</option>
    <option value="ar">🇸🇦 Arabic</option>
    <option value="pt">🇧🇷 Portuguese</option>
  </select>

  <label>TTS Backend</label>
  <select id="tts_backend">
    <option value="gemini">Gemini TTS (Recommended)</option>
    <option value="google">Google Cloud TTS</option>
    <option value="elevenlabs">ElevenLabs</option>
    <option value="edge">Microsoft Edge TTS (Free)</option>
  </select>

  <label>Audio Mode</label>
  <select id="mix_mode">
    <option value="overlay">Overlay (Keep original low)</option>
    <option value="replace">Replace Original Audio</option>
  </select>

  <button id="dub_btn">🎬 Dub This Video</button>
  
  <div class="status" id="status">Open a YouTube video and click "Dub This"</div>

  <script src="popup.js"></script>
</body>
</html>
